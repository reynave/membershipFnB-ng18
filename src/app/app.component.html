<div class="min-h-dvh bg-[radial-gradient(circle_at_20%_10%,#e9efe3_0%,transparent_45%),radial-gradient(circle_at_80%_80%,#f5eadf_0%,transparent_40%),#f2f2f2]">
  <div class="min-h-dvh w-full" [class.mx-auto]="!hideChrome" [class.max-w-[430px]]="!hideChrome" [class.bg-[#f8f8f7]]="!hideChrome" [class.shadow-[0_0_0_1px_rgba(0,0,0,.04)]]="!hideChrome">
    <header *ngIf="!hideChrome" class="sticky top-0 z-20 flex items-center justify-between border-b border-[#e8e8e8] bg-[#f8f8f7f5] px-4 py-3 backdrop-blur">
      <button type="button" class="rounded-full p-2 text-brand-800 hover:bg-black/5">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <h1 class="font-headline text-3xl font-bold tracking-[.08em] text-brand-800">MITRALINK FNB</h1>
      <button type="button" class="rounded-full p-2 text-brand-800 hover:bg-black/5" (click)="logout()" aria-label="Logout">
        <span class="material-symbols-outlined">logout</span>
      </button>
    </header>

    <main class="min-h-dvh" [class.pb-24]="!hideChrome">
      <router-outlet></router-outlet>
    </main>

    <nav *ngIf="!hideChrome" aria-label="Primary navigation" class="fixed bottom-0 left-1/2 z-20 grid w-full max-w-[430px] -translate-x-1/2 grid-cols-5 gap-1 border-t border-[#e8e8e8] bg-[#f8f8f7f5] px-2 py-2 backdrop-blur">
      <a routerLink="/dashboard" routerLinkActive="bg-gradient-to-br from-brand-900 to-brand-700 text-white" [routerLinkActiveOptions]="{ exact: true }" class="flex flex-col items-center rounded-xl px-1 py-2 text-[11px] font-bold uppercase tracking-wide text-[#7a726c]">
        <span class="material-symbols-outlined text-base">home</span>
        <span>Home</span>
      </a>
       <a routerLink="/point-history" routerLinkActive="bg-gradient-to-br from-brand-900 to-brand-700 text-white" class="flex flex-col items-center rounded-xl px-1 py-2 text-[11px] font-bold uppercase tracking-wide text-[#7a726c]">
        <span class="material-symbols-outlined text-base">history</span>
        <span>History</span>
      </a>
      <a routerLink="/categories" routerLinkActive="bg-gradient-to-br from-brand-900 to-brand-700 text-white" class="flex flex-col items-center rounded-xl px-1 py-2 text-[11px] font-bold uppercase tracking-wide text-[#7a726c]">
        <span class="material-symbols-outlined text-base">storefront</span>
        <span>Outlet</span>
      </a>
      <a routerLink="/loyalty-bonuses" routerLinkActive="bg-gradient-to-br from-brand-900 to-brand-700 text-white" class="flex flex-col items-center rounded-xl px-1 py-2 text-[11px] font-bold uppercase tracking-wide text-[#7a726c]">
        <span class="material-symbols-outlined text-base">redeem</span>
        <span>Rewards</span>
      </a>
      <a routerLink="/profile" routerLinkActive="bg-gradient-to-br from-brand-900 to-brand-700 text-white" class="flex flex-col items-center rounded-xl px-1 py-2 text-[11px] font-bold uppercase tracking-wide text-[#7a726c]">
        <span class="material-symbols-outlined text-base">person</span>
        <span>Profile</span>
      </a>
     
    </nav>
  </div>
</div>
