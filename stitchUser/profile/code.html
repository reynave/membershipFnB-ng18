<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#f4f3f2",
                        "surface-variant": "#e3e2e1",
                        "on-tertiary-fixed-variant": "#5c403a",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#23501e",
                        "outline-variant": "#c2c9bb",
                        "surface-container-high": "#e9e8e7",
                        "surface-tint": "#3b6934",
                        "secondary-fixed-dim": "#ffb786",
                        "primary-fixed-dim": "#a1d494",
                        "surface-bright": "#faf9f8",
                        "primary": "#154212",
                        "on-surface": "#1a1c1c",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#ffdcc6",
                        "on-tertiary-container": "#e1bab1",
                        "surface": "#faf9f8",
                        "outline": "#72796e",
                        "on-primary": "#ffffff",
                        "background": "#faf9f8",
                        "secondary": "#914c14",
                        "on-secondary-fixed": "#311400",
                        "on-primary-fixed": "#002201",
                        "primary-fixed": "#bcf0ae",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#ffdad2",
                        "secondary-container": "#fda465",
                        "surface-dim": "#dadad9",
                        "primary-container": "#2d5a27",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#e5beb5",
                        "on-tertiary-fixed": "#2b1611",
                        "on-surface-variant": "#42493e",
                        "tertiary": "#4d332d",
                        "tertiary-container": "#664943",
                        "surface-container-highest": "#e3e2e1",
                        "on-error": "#ffffff",
                        "surface-container": "#eeeeed",
                        "inverse-surface": "#2f3130",
                        "inverse-on-surface": "#f1f0f0",
                        "on-secondary-fixed-variant": "#723600",
                        "on-background": "#1a1c1c",
                        "on-secondary-container": "#753800",
                        "on-primary-container": "#9dd090",
                        "inverse-primary": "#a1d494"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Noto Serif', serif; }
        .glass-nav {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#faf9f8] dark:bg-stone-950/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full bg-gradient-to-b from-stone-200/20 to-transparent dark:from-stone-800/20">
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-200 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors p-2 rounded-full text-stone-500 dark:text-stone-400">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Noto_Serif'] text-lg font-bold tracking-tight text-[#2D5A27] dark:text-emerald-500">Profile</h1>
</div>
<button class="active:scale-95 duration-200 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors p-2 rounded-full text-stone-500 dark:text-stone-400">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Profile Header Section -->
<section class="mb-12 text-center">
<h2 class="text-2xl font-bold text-primary mt-2">Alexander Thorne</h2>
<p class="text-on-surface-variant font-medium tracking-wide">Epicurean Gold Member</p>
</section>
<!-- Form Section -->
<form class="space-y-8">
<!-- Personal Information -->
<div class="space-y-6">
<div class="flex items-center gap-3 mb-2">
<span class="material-symbols-outlined text-primary" data-icon="person">person</span>
<h3 class="text-lg font-semibold tracking-tight">Personal Details</h3>
</div>
<div class="grid grid-cols-1 gap-6">
<!-- Full Name -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1">Full Name</label>
<input class="w-full px-5 py-4 bg-surface-container-highest rounded-xl border-none focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 text-on-surface font-medium" type="text" value="Alexander Thorne"/>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1">Email Address</label>
<input class="w-full px-5 py-4 bg-surface-container-highest rounded-xl border-none focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 text-on-surface font-medium" type="email" value="alex.thorne@epicurean.com"/>
</div>
<!-- Phone -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1">Phone Number</label>
<input class="w-full px-5 py-4 bg-surface-container-highest rounded-xl border-none focus:ring-1 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300 text-on-surface font-medium" type="tel" value="+1 (555) 012-3456"/>
</div>
</div>
</div>
<!-- Security Section -->
<div class="pt-8 space-y-6">
<div class="flex items-center gap-3 mb-2">
<span class="material-symbols-outlined text-primary" data-icon="lock">lock</span>
<h3 class="text-lg font-semibold tracking-tight">Security</h3>
</div>
<div class="bg-surface-container-low rounded-xl p-6 space-y-4">
<div class="flex items-center justify-between">
<div>
<p class="font-bold text-on-surface">Password</p>
<p class="text-sm text-on-surface-variant">Last updated 3 months ago</p>
</div>
<button class="text-primary font-bold text-sm hover:underline" type="button">Change Password</button>
</div>
</div>
</div>
<!-- CTA -->
<div class="pt-10">
<button class="w-full py-5 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg rounded-xl shadow-xl active:scale-[0.98] transition-all duration-200" type="submit">
                    Save Changes
                </button>
<p class="text-center text-on-surface-variant text-xs mt-6 px-10 leading-relaxed">
                    Changes to your primary contact information will be verified via a confirmation code.
                </p>
</div>
</form>
</main>
 
</body></html>
